name: Build and Push Standard Docker Image

on:
  repository_dispatch:
    types: [caddy-release]
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Caddy version to build (without v prefix, e.g., 2.8.0)'
        required: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-docker-image.yml
    with:
      caddy_version: ${{ github.event.inputs.build_version || github.event.client_payload.caddy_version }}
      dockerfile: Dockerfile
      image_title: Caddy Cloudflare
      image_description: Caddy with Cloudflare DNS module
      flavor_latest: "auto"
      create_release: true
      build_reason: ${{ github.event.client_payload.build_reason || 'manual' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY_NAME: ${{ secrets.DOCKERHUB_REPOSITORY_NAME }}
