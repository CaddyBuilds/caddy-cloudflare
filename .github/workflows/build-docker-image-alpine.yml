name: Build and Push Alpine Docker Image

on:
  repository_dispatch:
    types: [caddy-release]
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Caddy version to build (without v prefix, e.g., 2.8.0)'
        required: false

jobs:
  build:
    uses: ./.github/workflows/build-docker-image.yml
    with:
      caddy_version: ${{ github.event.inputs.build_version || github.event.client_payload.caddy_version }}
      dockerfile: Dockerfile.alpine
      tag_suffix: "-alpine"
      static_tag: "alpine"
      image_title: Caddy Cloudflare Alpine
      image_description: Caddy with Cloudflare DNS module (Alpine)
      flavor_latest: "false"
      create_release: false
      build_reason: ${{ github.event.client_payload.build_reason || 'manual' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY_NAME: ${{ secrets.DOCKERHUB_REPOSITORY_NAME }}
